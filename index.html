<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Countdown Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-white: #f0f0f0;
            --clr-yellow: #FFD700;
            --clr-orange: #FF8C00;
            --clr-red: #FF2020;
            --clr-red-dark: #CC0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 70px 20px 70px;
            overflow-x: hidden;
            overflow-y: hidden;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Ambient glow blob */
        .glow-bg {
            position: fixed;
            width: 700px;
            height: 350px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            background: var(--clr-white);
            transition: background 1s ease, opacity 1s ease;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(10px, 2vh, 28px);
            width: 100%;
        }

        /* Label */
        .label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 22px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            transition: color 1s;
        }

        /* Timer Display */
        #timer {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(100px, min(42vw, 55vh), 560px);
            line-height: 0.9;
            color: var(--clr-white);
            letter-spacing: 0.02em;
            transition: color 0.5s ease, text-shadow 0.5s ease;
            text-shadow: none;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* State: WARNING (yellow) */
        #timer.warning {
            color: var(--clr-yellow);
            text-shadow: none;
            animation: pulse-yellow 1s ease-in-out infinite;
        }

        /* State: CRITICAL (red) */
        #timer.critical {
            color: var(--clr-red);
            text-shadow: none;
            animation: pulse-red 0.6s ease-in-out infinite;
        }

        @keyframes pulse-yellow {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.75; }
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.6; }
        }

        /* Progress bar */
        .progress-track {
            width: min(600px, 80vw);
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 100%;
            background: var(--clr-white);
            transform-origin: left;
            transition: transform 1s linear, background 0.5s;
        }

        /* Status line */
        .status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.45em;
            color: rgba(255,255,255,0.22);
            text-transform: uppercase;
            transition: color 0.5s;
        }

        /* ── Firebase Status Badge ── */
        .firebase-status {
            position: fixed;
            top: 18px;
            right: 24px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            font-family: 'Share Tech Mono', monospace;
        }
        .firebase-status .row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .dot.connected { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
        .dot.error     { background: #ff4040; box-shadow: 0 0 6px #ff4040; }
        #fbLabel {
            font-size: 10px;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
        }
        #userEmail {
            font-size: 9px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.15);
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #logoutBtn {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.25);
            padding: 3px 8px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #logoutBtn:hover {
            border-color: rgba(255,80,80,0.5);
            color: rgba(255,80,80,0.8);
        }

        /* ── Current Clock ── */
        .current-clock {
            position: fixed;
            bottom: 24px;
            left: 28px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            z-index: 20;
        }
        .clock-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
        #clockDisplay {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.06em;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
        }
        .clock-date {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.18);
        }

        /* ── Company Logo ── */
        .company-logo {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 50;
        }
        .company-logo img { height: 56px; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .current-clock { bottom: 16px; left: 20px; }
            #clockDisplay { font-size: 36px; }
            .company-logo img { height: 36px; }
        }
        @media (max-width: 768px) {
            body { padding: 60px 12px 90px; }
            #timer { font-size: clamp(80px, min(42vw, 46vh), 320px); }
            #clockDisplay { font-size: 28px; }
            .wrapper { gap: 8px; }
        }
        @media (max-height: 700px) {
            body { padding: 60px 20px 90px; }
            #timer { font-size: clamp(80px, min(38vw, 48vh), 380px); }
            #clockDisplay { font-size: 28px; }
            .wrapper { gap: 6px; }
        }
        @media (max-height: 500px) {
            body { padding: 50px 20px 80px; }
            #timer { font-size: clamp(70px, min(34vw, 44vh), 280px); }
            #clockDisplay { font-size: 22px; }
            .label { display: none; }
        }
    </style>
</head>

                        color:#f0f0f0; font-family:'Share Tech Mono',monospace;
                        font-size:18px; letter-spacing:0.08em;

                    onblur="this.style.borderBottomColor='rgba(255,255,255,0.2)'"
                    oninput="clearAuthError()"
                    onkeydown="if(event.key==='Enter') document.getElementById('authPass').focus()"

            </div>

            <!-- Password -->
            <div style="margin-bottom:12px; text-align:left;">
                <div style="font-size:11px; letter-spacing:0.3em; color:rgba(255,255,255,0.28); text-transform:uppercase; margin-bottom:10px;">PASSWORD</div>
                <input id="authPass" type="password" placeholder="••••••••"

                        width:100%; background:transparent; border:none;
                        border-bottom:1px solid rgba(255,255,255,0.2);

                        font-size:26px; letter-spacing:0.2em;
                        padding:10px 0; outline:none; transition:border-color 0.2s;

                    oninput="clearAuthError()"
                    onkeydown="if(event.key==='Enter') doLogin()"
                >
            </div>

            <div id="authError" style="
                font-size:12px; letter-spacing:0.2em;
                color:rgba(255,32,32,0.8); text-transform:uppercase;

            "></div>

                color:rgba(255,255,255,0.6);

                font-size:13px; letter-spacing:0.4em;
                text-transform:uppercase; padding:14px;
                cursor:pointer; border-radius:2px; transition:all 0.2s;
            "
            onmouseover="this.style.background='rgba(255,255,255,0.06)';this.style.borderColor='rgba(255,255,255,0.5)';this.style.color='#f0f0f0'"
            onmouseout="this.style.background='transparent';this.style.borderColor='rgba(255,255,255,0.2)';this.style.color='rgba(255,255,255,0.6)'"
            >SIGN IN</button>

            <div style="
                margin-top:26px; font-size:11px; letter-spacing:0.22em;
                color:rgba(255,255,255,0.1); text-transform:uppercase;
            ">ระบบรักษาความปลอดภัยด้วย Firebase Auth</div>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════
        //  FIREBASE CONFIG
        // ══════════════════════════════════════════
        const firebaseConfig = {
            apiKey:            "AIzaSyCNYZ59j-xj_JGU3erli9nc-vRDvOKfd7o",
            authDomain:        "companion-timer.firebaseapp.com",
            databaseURL:       "https://companion-timer-default-rtdb.asia-southeast1.firebasedatabase.app",

        // ══════════════════════════════════════════
        //  THRESHOLD CONFIG
        // ══════════════════════════════════════════
        const WARNING_THRESHOLD  = 300;   // วินาที → สีเหลือง
        const CRITICAL_THRESHOLD = 120;   // วินาที → สีแดง
        const MAX_NEGATIVE_SEC   = 99 * 60; // cap สูงสุดฝั่งลบ

        // ══════════════════════════════════════════
        //  TIMER STATE
        // ══════════════════════════════════════════
        let defaultTime       = 300;
        let timeLeft          = defaultTime;
        let countdownInterval = null;
        let isRunning         = false;

        const timerEl    = document.getElementById('timer');
        const progressEl = document.getElementById('progressFill');
        const statusEl   = document.getElementById('statusLine');
        const glowBg     = document.getElementById('glowBg');
        const fbDot      = document.getElementById('fbDot');
        const fbLabel    = document.getElementById('fbLabel');

        // ── Display ──────────────────────────────
        function updateDisplay() {
            const isNeg   = timeLeft < 0;
            const absTime = Math.abs(timeLeft);
            const hh      = Math.floor(absTime / 3600);
            const mm      = Math.floor((absTime % 3600) / 60).toString().padStart(2, '0');
            const ss      = (absTime % 60).toString().padStart(2, '0');
            const prefix  = isNeg ? '-' : '';
            timerEl.textContent = hh > 0
                ? prefix + hh + ':' + mm + ':' + ss
                : prefix + mm + ':' + ss;

            timerEl.classList.remove('warning', 'critical');

            if (timeLeft <= 0) {
                timerEl.classList.add('critical');
                glowBg.style.background     = 'rgb(255,32,32)';
                glowBg.style.opacity        = '0.18';
                progressEl.style.background = 'var(--clr-red)';
                statusEl.textContent        = isRunning ? '— TIME OVER —' : '— STOPPED —';
                statusEl.style.color        = 'rgba(255,80,80,0.5)';
            } else if (timeLeft <= CRITICAL_THRESHOLD) {
                timerEl.classList.add('critical');
                glowBg.style.background     = 'rgb(255,32,32)';
                glowBg.style.opacity        = '0.18';
                progressEl.style.background = 'var(--clr-red)';
                statusEl.textContent        = '— CRITICAL —';
                statusEl.style.color        = 'rgba(255,80,80,0.5)';
            } else if (timeLeft <= WARNING_THRESHOLD) {
                timerEl.classList.add('warning');
                glowBg.style.background     = 'rgb(255,215,0)';
                glowBg.style.opacity        = '0.15';
                progressEl.style.background = 'var(--clr-yellow)';
                statusEl.textContent        = '— WARNING —';
                statusEl.style.color        = 'rgba(255,215,0,0.5)';
            } else {
                glowBg.style.background     = 'rgb(240,240,240)';
                glowBg.style.opacity        = '0.10';
                progressEl.style.background = 'var(--clr-white)';
                statusEl.textContent        = isRunning ? '— RUNNING —' : '— READY —';
                statusEl.style.color        = 'rgba(255,255,255,0.18)';
            }

            // Progress bar (positive countdown only)
            const ratio = Math.max(0, timeLeft / defaultTime);
            progressEl.style.transform = `scaleX(${ratio})`;
        }

        // ── Core timer controls ───────────────────
        function startTimer() {
            if (countdownInterval) return;
            isRunning = true;
            countdownInterval = setInterval(() => {
                timeLeft -= 1;
                updateDisplay();
            }, 1000);
            updateDisplay();
        }

        function pauseTimer() {
            clearInterval(countdownInterval);
            countdownInterval = null;
            isRunning = false;
            updateDisplay();
        }

        /**
         * FIX: resetTimer กลับไปที่ defaultTime (ไม่ใช่ 0)
         */
        function resetTimer() {
            pauseTimer();
            timeLeft = defaultTime;
            updateDisplay();
        }

        function stopTimer() {
            pauseTimer();
            timeLeft = defaultTime;
            updateDisplay();
        }

        // ── applyCommand: logic แยกออกจาก sync ───
        function applyCommand(cmd) {
            if (!cmd) return;

            if (cmd === 'start') {
                startTimer();
            } else if (cmd === 'pause') {
                pauseTimer();
            } else if (cmd === 'reset') {
                resetTimer();
            } else if (cmd === 'stop') {
                stopTimer();
            } else if (cmd.startsWith('set_')) {
                const seconds = parseInt(cmd.split('_')[1], 10);
                if (!isNaN(seconds) && seconds > 0) {
                    pauseTimer();
                    defaultTime = seconds;
                    timeLeft    = seconds;
                    updateDisplay();
                }
            } else if (cmd.startsWith('add_')) {
                const seconds = parseInt(cmd.split('_')[1], 10);
                if (!isNaN(seconds)) {
                    timeLeft    += seconds;
                    defaultTime  = Math.max(defaultTime, timeLeft);
                    updateDisplay();
                }
            } else if (cmd.startsWith('sub_')) {
                /**
                 * FIX: clamp ค่าต่ำสุดเพื่อป้องกัน overflow ฝั่งลบ
                 * รูปแบบ: sub_<seconds>_<timestamp>  (timestamp ทำให้ค่า unique)
                 */
                const seconds = parseInt(cmd.split('_')[1], 10);
                if (!isNaN(seconds)) {
                    timeLeft = Math.max(timeLeft - seconds, -MAX_NEGATIVE_SEC);
                    updateDisplay();
                }
            }
        }

        /**
         * FIX: localCommand ใช้ applyCommand แทนการ call ฟังก์ชันโดยตรง
         * เพื่อป้องกัน double-execution เมื่อ Firebase listener ยิงกลับมา
         * วิธี: ใช้ flag isLocalAction เพื่อ skip Firebase listener รอบที่ตัวเองส่ง
         */
        let isLocalAction = false;

        function localCommand(cmd) {
            applyCommand(cmd);
            if (database && firebase.auth().currentUser) {
                isLocalAction = true;
                database.ref('timer/command').set(cmd).finally(() => {
                    // รีเซ็ต flag หลัง Firebase ตอบกลับ
                    setTimeout(() => { isLocalAction = false; }, 300);
                });
            }
        }

        // ══════════════════════════════════════════
        //  AUTH
        // ══════════════════════════════════════════
        function showLogin() {
            const overlay = document.getElementById('loginOverlay');
            overlay.style.display   = 'flex';
            overlay.style.opacity   = '1';
            overlay.style.transition = '';
            setTimeout(() => document.getElementById('authEmail').focus(), 100);
        }

        function hideLogin() {
            const overlay = document.getElementById('loginOverlay');
            overlay.style.transition = 'opacity 0.5s ease';
            overlay.style.opacity   = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
        }

        function doLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const pass  = document.getElementById('authPass').value;
            const btn   = document.getElementById('loginBtn');
            const err   = document.getElementById('authError');

            if (!email || !pass) {
                err.textContent    = 'กรุณากรอก email และ password';
                err.style.opacity  = '1';
                return;
            }

            btn.textContent = 'SIGNING IN...';
            btn.style.opacity = '0.5';
            btn.disabled = true;

            firebase.auth().signInWithEmailAndPassword(email, pass)
                .catch(e => {
                    btn.textContent   = 'SIGN IN';
                    btn.style.opacity = '1';
                    btn.disabled      = false;
                    const msgs = {
                        'auth/user-not-found':     'ไม่พบ email นี้ในระบบ',
                        'auth/wrong-password':     'รหัสผ่านไม่ถูกต้อง',
                        'auth/invalid-email':      'รูปแบบ email ไม่ถูกต้อง',
                        'auth/too-many-requests':  'ลองใหม่อีกครั้ง (ถูก block ชั่วคราว)',
                        'auth/invalid-credential': 'Email หรือ Password ไม่ถูกต้อง',
                    };
                    err.textContent   = msgs[e.code] || 'เข้าสู่ระบบไม่ได้: ' + e.message;
                    err.style.opacity = '1';
                    document.getElementById('authPass').value = '';
                    document.getElementById('authPass').focus();
                });
        }

        function clearAuthError() {
            document.getElementById('authError').style.opacity = '0';
        }

        function doLogout() {
            firebase.auth().signOut();
        }

        // ══════════════════════════════════════════
        //  FIREBASE INIT
        // ══════════════════════════════════════════
        let database = null;

        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();

            // ── Auth state ──
            firebase.auth().onAuthStateChanged(user => {
                if (user) {
                    hideLogin();
                    const emailEl = document.getElementById('userEmail');
                    if (emailEl) emailEl.textContent = user.email;
                } else {
                    showLogin();
                }
            });

            // ── Connection indicator ──
            database.ref('.info/connected').on('value', snap => {
                if (snap.val()) {
                    fbDot.className    = 'dot connected';
                    fbLabel.textContent = 'LIVE';
                } else {
                    fbDot.className    = 'dot error';
                    fbLabel.textContent = 'OFFLINE';
                }
            });

            // ── Command listener ──────────────────
            // FIX: guard ด้วย auth check + isLocalAction flag
            database.ref('timer/command').on('value', snap => {
                // ไม่รับคำสั่งถ้ายังไม่ได้ login
                if (!firebase.auth().currentUser) return;
                // ไม่รับคำสั่งที่ตัวเองเพิ่งส่ง (ป้องกัน double-execution)
                if (isLocalAction) return;

                applyCommand(snap.val());
            });

        } catch (e) {
            fbDot.className    = 'dot error';
            fbLabel.textContent = 'NO DB';
            console.warn('Firebase not configured:', e.message);
        }

        // ══════════════════════════════════════════
        //  CURRENT CLOCK
        // ══════════════════════════════════════════
        const clockEl    = document.getElementById('clockDisplay');
        const dateEl     = document.getElementById('clockDate');
        const DAYS_TH    = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
        const MONTHS_TH  = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

        function updateClock() {
            const now   = new Date();
            const hh    = now.getHours().toString().padStart(2, '0');
            const mm    = now.getMinutes().toString().padStart(2, '0');
            const ss    = now.getSeconds().toString().padStart(2, '0');
            clockEl.textContent = `${hh}:${mm}:${ss}`;

            const day   = DAYS_TH[now.getDay()];
            const date  = now.getDate();
            const month = MONTHS_TH[now.getMonth()];
            const year  = now.getFullYear() + 543;
            dateEl.textContent = `${day} ${date} ${month} ${year}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Init display
        updateDisplay();
    </script>
</body>
</html>

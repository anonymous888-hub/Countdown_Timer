<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Timer by Kaekung</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-white: #f0f0f0;
            --clr-yellow: #FFD700;
            --clr-red: #FF2020;
            --clr-accent: #7ee8fa;
            --clr-pink: #ff80ab;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh;
            padding: 80px 20px;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }
        .glow-bg {
            position: fixed; width: 700px; height: 350px;
            border-radius: 50%; filter: blur(120px);
            opacity: 0.12; background: var(--clr-white);
            transition: background 1s ease, opacity 1s ease;
            pointer-events: none; z-index: 0;
        }
        .wrapper {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center;
            gap: clamp(10px, 2vh, 28px);
            width: 100%;
        }
        .label {
            font-size: 22px; letter-spacing: 0.5em;
            text-transform: uppercase; color: rgba(255,255,255,0.25);
        }
        #timer {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(100px, min(42vw, 55vh), 560px);
            line-height: 0.9; color: var(--clr-white);
            letter-spacing: 0.02em;
            transition: color 0.5s; -webkit-font-smoothing: antialiased;
            user-select: none;
        }
        #timer.warning  { color: var(--clr-yellow); animation: pulse-y 1s ease-in-out infinite; }
        #timer.critical { color: var(--clr-red);    animation: pulse-r 0.6s ease-in-out infinite; }
        @keyframes pulse-y { 0%,100%{opacity:1} 50%{opacity:.75} }
        @keyframes pulse-r { 0%,100%{opacity:1} 50%{opacity:.6} }
        .progress-track {
            width: min(600px, 80vw); height: 3px;
            background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 100%; background: var(--clr-white);
            transform-origin: left; transition: transform 0.5s linear, background 0.5s;
        }
        .status {
            font-size: 14px; letter-spacing: 0.45em;
            color: rgba(255,255,255,0.22); text-transform: uppercase; transition: color 0.5s;
        }
        .firebase-status {
            position: fixed; top: 18px; right: 24px; z-index: 50;
            display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
        }
        .fb-row { display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.connected { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
        .dot.error     { background: #ff4040; box-shadow: 0 0 6px #ff4040; }
        #fbLabel { font-size: 10px; letter-spacing: 0.35em; color: rgba(255,255,255,0.25); text-transform: uppercase; }
        #userEmail { font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.18); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #logoutBtn {
            font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 0.25em;
            text-transform: uppercase; background: transparent;
            border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.25);
            padding: 3px 8px; border-radius: 2px; cursor: pointer; transition: all 0.2s;
        }
        #logoutBtn:hover { border-color: rgba(255,80,80,0.5); color: rgba(255,80,80,0.8); }
        .kaekung-brand {
            position: fixed; top: 16px; left: 20px; z-index: 50;
            display: flex; align-items: center; gap: 10px;
        }
        .mascot-wrap {
            width: 54px; height: 54px; flex-shrink: 0;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(126,232,250,0.4));
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
        .brand-text { display: flex; flex-direction: column; line-height: 1.15; }
        .brand-sub  { font-size: 9px; letter-spacing: 0.4em; color: rgba(255,255,255,0.22); text-transform: uppercase; }
        .brand-name {
            font-family: 'Kanit', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: 0.08em;
            background: linear-gradient(90deg, #7ee8fa, #ff80ab);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .current-clock {
            position: fixed; bottom: 24px; left: 28px; z-index: 20;
            display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
        }
        .clock-label { font-size: 10px; letter-spacing: 0.35em; color: rgba(255,255,255,0.2); text-transform: uppercase; }
        #clockDisplay { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: rgba(255,255,255,0.55); letter-spacing: 0.06em; line-height: 1; }
        .clock-date { font-size: 11px; letter-spacing: 0.3em; color: rgba(255,255,255,0.18); }

        /* LOGIN OVERLAY */
        #loginOverlay {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-blob {
            position: absolute; width: 500px; height: 260px;
            border-radius: 50%; filter: blur(100px); opacity: 0.1;
            background: #7ee8fa; pointer-events: none;
        }
        .login-card {
            position: relative; text-align: center;
            width: 360px; max-width: 92vw;
        }
        .login-mascot {
            margin: 0 auto 16px; width: 72px; height: 72px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(126,232,250,0.4));
        }
        .login-title {
            font-family: 'Kanit', sans-serif; font-weight: 700;
            font-size: clamp(26px, 6vw, 36px); letter-spacing: 0.1em;
            background: linear-gradient(90deg, #7ee8fa, #ff80ab);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 4px;
        }
        .login-sub { font-size: 11px; letter-spacing: 0.4em; color: rgba(255,255,255,0.2); text-transform: uppercase; margin-bottom: 36px; }
        .login-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .login-input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            color: rgba(255,255,255,0.85); font-family: 'Share Tech Mono', monospace;
            font-size: 13px; letter-spacing: 0.1em;
            outline: none; transition: border-color 0.2s;
        }
        .login-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 0.05em; }
        .login-input:focus { border-color: rgba(126,232,250,0.6); }
        .login-btn {
            width: 100%; padding: 13px 20px;
            background: rgba(126,232,250,0.1);
            border: 1px solid rgba(126,232,250,0.4); border-radius: 8px;
            color: #7ee8fa; font-family: 'Share Tech Mono', monospace;
            font-size: 13px; letter-spacing: 0.35em; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
        }
        .login-btn:hover { background: rgba(126,232,250,0.18); border-color: #7ee8fa; }
        .login-btn:active { transform: scale(0.98); }

        /* Fullscreen button */
        #fsBtn {
            position: fixed; bottom: 24px; right: 24px; z-index: 50;
            width: 48px; height: 48px; border-radius: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.22);
            color: rgba(255,255,255,0.55);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; backdrop-filter: blur(6px);
        }
        #fsBtn:hover {
            background: rgba(126,232,250,0.15);
            border-color: rgba(126,232,250,0.6);
            color: #7ee8fa;
            transform: scale(1.08);
        }
        #fsBtn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

        @media (max-width: 900px) {
            .mascot-wrap { width: 42px; height: 42px; }
            .brand-name { font-size: 14px; }
            #clockDisplay { font-size: 36px; }
        }
        @media (max-width: 768px) {
            body { padding: 60px 12px 90px; }
            #timer { font-size: clamp(80px, min(42vw, 46vh), 320px); }
            #clockDisplay { font-size: 28px; }
        }
        @media (max-height: 500px) {
            body { padding: 50px 20px 80px; }
            #timer { font-size: clamp(70px, min(34vw, 44vh), 280px); }
            .label { display: none; }
        }
        .star { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; animation: twinkle linear infinite; }
        @keyframes twinkle { 0%,100%{opacity:.04;transform:scale(1)} 50%{opacity:.22;transform:scale(1.4)} }
    </style>
</head>

<script>
const firebaseConfig = {
    apiKey:            "AIzaSyCNYZ59j-xj_JGU3erli9nc-vRDvOKfd7o",
    authDomain:        "companion-timer.firebaseapp.com",
    databaseURL:       "https://companion-timer-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "companion-timer",
    storageBucket:     "companion-timer.firebasestorage.app",
    messagingSenderId: "635614245273",
    appId:             "1:635614245273:web:336d48f4a5ba4e2621e308"
};

const WARNING_THRESHOLD  = 300;
const CRITICAL_THRESHOLD = 120;
const MAX_NEGATIVE_SEC   = 99 * 60;

var defaultTime = 300;
var isRunning   = false;

/* Firebase source-of-truth */
var _fbTimeLeft    = 300;
var _fbUpdatedAt   = null;
var _fbRunning     = false;
var _fbDefaultTime = 300;

var _tickInterval     = null;
var _stateListening   = false;

var timerEl    = document.getElementById('timer');
var progressEl = document.getElementById('progressFill');
var statusEl   = document.getElementById('statusLine');
var glowBg     = document.getElementById('glowBg');
var fbDot      = document.getElementById('fbDot');
var fbLabel    = document.getElementById('fbLabel');

/* ── คำนวณ timeLeft ปัจจุบันจาก Firebase ── */
function calcTimeLeft() {
    if (_fbRunning && _fbUpdatedAt) {
        var elapsed = Math.round((Date.now() - _fbUpdatedAt) / 1000);
        return _fbTimeLeft - elapsed;
    }
    return _fbTimeLeft;
}

function updateDisplay() {
    var timeLeft = calcTimeLeft();
    var isNeg   = timeLeft < 0;
    var absTime = Math.abs(timeLeft);
    var hh      = Math.floor(absTime / 3600);
    var mm      = Math.floor((absTime % 3600) / 60).toString().padStart(2,'0');
    var ss      = (absTime % 60).toString().padStart(2,'0');
    timerEl.textContent = hh > 0
        ? (isNeg ? '-' : '') + hh + ':' + mm + ':' + ss
        : (isNeg ? '-' : '') + mm + ':' + ss;

    timerEl.classList.remove('warning','critical');

    if (timeLeft <= 0) {
        timerEl.classList.add('critical');
        glowBg.style.background     = 'rgb(255,32,32)';
        glowBg.style.opacity        = '0.18';
        progressEl.style.background = 'var(--clr-red)';
        statusEl.textContent        = _fbRunning ? '— TIME OVER —' : '— STOPPED —';
        statusEl.style.color        = 'rgba(255,80,80,0.5)';
    } else if (timeLeft <= CRITICAL_THRESHOLD) {
        timerEl.classList.add('critical');
        glowBg.style.background     = 'rgb(255,32,32)';
        glowBg.style.opacity        = '0.18';
        progressEl.style.background = 'var(--clr-red)';
        statusEl.textContent        = '— CRITICAL —';
        statusEl.style.color        = 'rgba(255,80,80,0.5)';
    } else if (timeLeft <= WARNING_THRESHOLD) {
        timerEl.classList.add('warning');
        glowBg.style.background     = 'rgb(255,215,0)';
        glowBg.style.opacity        = '0.15';
        progressEl.style.background = 'var(--clr-yellow)';
        statusEl.textContent        = '— WARNING —';
        statusEl.style.color        = 'rgba(255,215,0,0.5)';
    } else {
        glowBg.style.background     = 'rgb(240,240,240)';
        glowBg.style.opacity        = '0.10';
        progressEl.style.background = 'var(--clr-white)';
        statusEl.textContent        = _fbRunning ? '— RUNNING —' : '— READY —';
        statusEl.style.color        = 'rgba(255,255,255,0.18)';
    }

    var ratio = Math.max(0, timeLeft / _fbDefaultTime);
    progressEl.style.transform = 'scaleX(' + ratio + ')';
}

/* ── User-scoped timer path ── */
function timerStateRef() {
    var user = firebase.auth().currentUser;
    if (!user) return null;
    return database.ref('users/' + user.uid + '/timer/state');
}

/* ════════════════════════════════════
   attachStateListener
   อ่าน state จาก Firebase อย่างเดียว
   ════════════════════════════════════ */
function attachStateListener() {
    if (_stateListening) return;
    var ref = timerStateRef();
    if (!ref) return;
    _stateListening = true;

    ref.on('value', function(snap) {
        var st = snap.val();
        if (!st) return;

        // อัปเดต local cache จาก Firebase
        if (typeof st.defaultTime === 'number' && st.defaultTime > 0)
            _fbDefaultTime = st.defaultTime;
        if (typeof st.timeLeft    === 'number') _fbTimeLeft  = st.timeLeft;
        if (typeof st.updatedAt   === 'number') _fbUpdatedAt = st.updatedAt;
        if (typeof st.isRunning   === 'boolean') {
            _fbRunning = st.isRunning;
            isRunning  = st.isRunning;
        }

        defaultTime = _fbDefaultTime;
        updateDisplay();

        // จัดการ tick interval
        if (_fbRunning && !_tickInterval) {
            _startTick();
        } else if (!_fbRunning && _tickInterval) {
            clearInterval(_tickInterval);
            _tickInterval = null;
        }
    });

    // เริ่ม tick ทันทีเผื่อ running อยู่แล้ว
    _startTick();
}

/* Smooth tick ทุก 250ms คำนวณจาก _fbUpdatedAt เสมอ ไม่ drift */
function _startTick() {
    if (_tickInterval) return;
    _tickInterval = setInterval(function() {
        if (!_fbRunning || !_fbUpdatedAt) return;
        updateDisplay();
    }, 250);
}

function detachStateListener() {
    var ref = timerStateRef();
    if (ref) ref.off();
    if (_tickInterval) { clearInterval(_tickInterval); _tickInterval = null; }
    _stateListening = false;
    _fbRunning = false;
    isRunning  = false;
    _fbUpdatedAt = null;
}

/* ═══ AUTH ═══ */
function loginEmail_pw() {
    var email = (document.getElementById('loginEmail').value || '').trim();
    var pass  = document.getElementById('loginPassword').value || '';
    var errEl = document.getElementById('loginErr');
    errEl.textContent = '';
    if (!email || !pass) { errEl.textContent = 'กรุณากรอกอีเมลและรหัสผ่าน'; return; }
    errEl.textContent = 'กำลังตรวจสอบ...';
    firebase.auth().signInWithEmailAndPassword(email, pass).catch(function(e) {
        var msg = e.code === 'auth/user-not-found'     ? 'ไม่พบบัญชีนี้'
                : e.code === 'auth/wrong-password'     ? 'รหัสผ่านไม่ถูกต้อง'
                : e.code === 'auth/invalid-email'      ? 'รูปแบบอีเมลไม่ถูกต้อง'
                : e.code === 'auth/invalid-credential' ? 'Email หรือ Password ไม่ถูกต้อง'
                : e.code === 'auth/too-many-requests'  ? 'ลองใหม่ภายหลัง'
                : 'เข้าสู่ระบบไม่ได้: ' + e.message;
        errEl.textContent = msg;
    });
}
function doLogout() { firebase.auth().signOut(); }

function showLogin() {
    var ov = document.getElementById('loginOverlay');
    ov.style.display = 'flex'; ov.style.opacity = '1'; ov.style.transition = '';
}
function hideLogin() {
    var ov = document.getElementById('loginOverlay');
    ov.style.transition = 'opacity 0.5s ease'; ov.style.opacity = '0';
    setTimeout(function(){ ov.style.display = 'none'; }, 500);
}

/* ═══ FIREBASE INIT ═══ */
firebase.initializeApp(firebaseConfig);
var database = firebase.database();

database.ref('.info/connected').on('value', function(snap) {
    if (snap.val()) { fbDot.className='dot connected'; fbLabel.textContent='LIVE'; }
    else            { fbDot.className='dot error';     fbLabel.textContent='OFFLINE'; }
});

firebase.auth().onAuthStateChanged(function(user) {
    if (user) {
        hideLogin();
        document.getElementById('userEmail').textContent = user.displayName || user.email;
        attachStateListener();
    } else {
        showLogin();
        document.getElementById('userEmail').textContent = '';
        detachStateListener();
    }
});

/* ═══ CLOCK ═══ */
var clockEl   = document.getElementById('clockDisplay');
var dateEl    = document.getElementById('clockDate');
var DAYS_TH   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
var MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function updateClock() {
    var now = new Date();
    clockEl.textContent = now.getHours().toString().padStart(2,'0') + ':' +
                          now.getMinutes().toString().padStart(2,'0') + ':' +
                          now.getSeconds().toString().padStart(2,'0');
    dateEl.textContent  = DAYS_TH[now.getDay()] + ' ' + now.getDate() + ' ' +
                          MONTHS_TH[now.getMonth()] + ' ' + (now.getFullYear()+543);
}
updateClock();
setInterval(updateClock, 1000);
updateDisplay();

/* ═══ FULLSCREEN ═══ */
var fsBtn = document.getElementById('fsBtn');

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function(err) {
            console.warn('Fullscreen error:', err);
        });
    } else {
        document.exitFullscreen();
    }
}

document.addEventListener('fullscreenchange', function() {
    var isFs = !!document.fullscreenElement;
    document.getElementById('fsIconExpand').style.display   = isFs ? 'none' : '';
    document.getElementById('fsIconCollapse').style.display = isFs ? '' : 'none';
    fsBtn.title = isFs ? 'ออกจากเต็มจอ' : 'เต็มจอ';
});
</script>

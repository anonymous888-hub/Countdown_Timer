<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Timer by Kaekung</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-white: #f0f0f0;
            --clr-yellow: #FFD700;
            --clr-orange: #FF8C00;
            --clr-red: #FF2020;
            --clr-red-dark: #CC0000;
            --clr-accent: #7ee8fa;
            --clr-pink: #ff80ab;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 80px 20px 80px;
            overflow-x: hidden;
            overflow-y: hidden;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Ambient glow blob */
        .glow-bg {
            position: fixed;
            width: 700px;
            height: 350px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            background: var(--clr-white);
            transition: background 1s ease, opacity 1s ease;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(10px, 2vh, 28px);
            width: 100%;
        }

        .label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 22px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            transition: color 1s;
        }

        #timer {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(100px, min(42vw, 55vh), 560px);
            line-height: 0.9;
            color: var(--clr-white);
            letter-spacing: 0.02em;
            transition: color 0.5s ease, text-shadow 0.5s ease;
            text-shadow: none;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        #timer.warning {
            color: var(--clr-yellow);
            animation: pulse-yellow 1s ease-in-out infinite;
        }
        #timer.critical {
            color: var(--clr-red);
            animation: pulse-red 0.6s ease-in-out infinite;
        }

        @keyframes pulse-yellow {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.75; }
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.6; }
        }

        .progress-track {
            width: min(600px, 80vw);
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 100%;
            background: var(--clr-white);
            transform-origin: left;
            transition: transform 1s linear, background 0.5s;
        }

        .status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.45em;
            color: rgba(255,255,255,0.22);
            text-transform: uppercase;
            transition: color 0.5s;
        }

        /* Firebase Status */
        .firebase-status {
            position: fixed;
            top: 18px;
            right: 24px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            font-family: 'Share Tech Mono', monospace;
        }
        .firebase-status .row { display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.connected { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
        .dot.error     { background: #ff4040; box-shadow: 0 0 6px #ff4040; }
        #fbLabel { font-size: 10px; letter-spacing: 0.35em; color: rgba(255,255,255,0.25); text-transform: uppercase; }
        #userEmail { font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.15); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #logoutBtn {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
            background: transparent; border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.25); padding: 3px 8px; border-radius: 2px;
            cursor: pointer; transition: all 0.2s;
        }
        #logoutBtn:hover { border-color: rgba(255,80,80,0.5); color: rgba(255,80,80,0.8); }

        /* Kaekung Brand Badge */
        .kaekung-brand {
            position: fixed;
            top: 16px;
            left: 20px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mascot-wrap {
            width: 54px;
            height: 54px;
            flex-shrink: 0;
            animation: mascot-float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(126,232,250,0.4));
        }
        @keyframes mascot-float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-5px); }
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.15;
        }
        .brand-text .by-line {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.4em;
            color: rgba(255,255,255,0.22);
            text-transform: uppercase;
        }
        .brand-text .name-line {
            font-family: 'Kanit', sans-serif;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: 0.08em;
            background: linear-gradient(90deg, #7ee8fa 0%, #ff80ab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Current Clock */
        .current-clock {
            position: fixed;
            bottom: 24px;
            left: 28px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            z-index: 20;
        }
        .clock-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 0.35em; color: rgba(255,255,255,0.2); text-transform: uppercase; }
        #clockDisplay { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: rgba(255,255,255,0.55); letter-spacing: 0.06em; line-height: 1; -webkit-font-smoothing: antialiased; }
        .clock-date { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 0.3em; color: rgba(255,255,255,0.18); }

        /* Responsive */
        @media (max-width: 900px) {
            .current-clock { bottom: 16px; left: 20px; }
            #clockDisplay { font-size: 36px; }
            .mascot-wrap { width: 42px; height: 42px; }
            .brand-text .name-line { font-size: 14px; }
        }
        @media (max-width: 768px) {
            body { padding: 60px 12px 90px; }
            #timer { font-size: clamp(80px, min(42vw, 46vh), 320px); }
            #clockDisplay { font-size: 28px; }
            .wrapper { gap: 8px; }
        }
        @media (max-height: 700px) {
            body { padding: 60px 20px 90px; }
            #timer { font-size: clamp(80px, min(38vw, 48vh), 380px); }
            #clockDisplay { font-size: 28px; }
            .wrapper { gap: 6px; }
        }
        @media (max-height: 500px) {
            body { padding: 50px 20px 80px; }
            #timer { font-size: clamp(70px, min(34vw, 44vh), 280px); }
            #clockDisplay { font-size: 22px; }
            .label { display: none; }
        }

        /* Star particles */
        .star {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.04; transform: scale(1); }
            50%      { opacity: 0.22; transform: scale(1.4); }
        }
    </style>
</head>

    <script>
        // ══════════════════════════════════════════
        //  FIREBASE CONFIG
        // ══════════════════════════════════════════
        const firebaseConfig = {
            apiKey:            "AIzaSyCNYZ59j-xj_JGU3erli9nc-vRDvOKfd7o",
            authDomain:        "companion-timer.firebaseapp.com",
            databaseURL:       "https://companion-timer-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId:         "companion-timer",
            storageBucket:     "companion-timer.firebasestorage.app",
            messagingSenderId: "635614245273",
            appId:             "1:635614245273:web:336d48f4a5ba4e2621e308"
        };

        // ══════════════════════════════════════════
        //  THRESHOLD CONFIG
        // ══════════════════════════════════════════
        const WARNING_THRESHOLD  = 300;
        const CRITICAL_THRESHOLD = 120;
        const MAX_NEGATIVE_SEC   = 99 * 60;

        // ══════════════════════════════════════════
        //  TIMER STATE
        // ══════════════════════════════════════════
        let defaultTime       = 300;
        let timeLeft          = defaultTime;
        let countdownInterval = null;
        let isRunning         = false;

        const timerEl    = document.getElementById('timer');
        const progressEl = document.getElementById('progressFill');
        const statusEl   = document.getElementById('statusLine');
        const glowBg     = document.getElementById('glowBg');
        const fbDot      = document.getElementById('fbDot');
        const fbLabel    = document.getElementById('fbLabel');

        function updateDisplay() {
            const isNeg   = timeLeft < 0;
            const absTime = Math.abs(timeLeft);
            const hh      = Math.floor(absTime / 3600);
            const mm      = Math.floor((absTime % 3600) / 60).toString().padStart(2, '0');
            const ss      = (absTime % 60).toString().padStart(2, '0');
            const prefix  = isNeg ? '-' : '';
            timerEl.textContent = hh > 0
                ? prefix + hh + ':' + mm + ':' + ss
                : prefix + mm + ':' + ss;

            timerEl.classList.remove('warning', 'critical');

            if (timeLeft <= 0) {
                timerEl.classList.add('critical');
                glowBg.style.background     = 'rgb(255,32,32)';
                glowBg.style.opacity        = '0.18';
                progressEl.style.background = 'var(--clr-red)';
                statusEl.textContent        = isRunning ? '— TIME OVER —' : '— STOPPED —';
                statusEl.style.color        = 'rgba(255,80,80,0.5)';
            } else if (timeLeft <= CRITICAL_THRESHOLD) {
                timerEl.classList.add('critical');
                glowBg.style.background     = 'rgb(255,32,32)';
                glowBg.style.opacity        = '0.18';
                progressEl.style.background = 'var(--clr-red)';
                statusEl.textContent        = '— CRITICAL —';
                statusEl.style.color        = 'rgba(255,80,80,0.5)';
            } else if (timeLeft <= WARNING_THRESHOLD) {
                timerEl.classList.add('warning');
                glowBg.style.background     = 'rgb(255,215,0)';
                glowBg.style.opacity        = '0.15';
                progressEl.style.background = 'var(--clr-yellow)';
                statusEl.textContent        = '— WARNING —';
                statusEl.style.color        = 'rgba(255,215,0,0.5)';
            } else {
                glowBg.style.background     = 'rgb(240,240,240)';
                glowBg.style.opacity        = '0.10';
                progressEl.style.background = 'var(--clr-white)';
                statusEl.textContent        = isRunning ? '— RUNNING —' : '— READY —';
                statusEl.style.color        = 'rgba(255,255,255,0.18)';
            }

            const ratio = Math.max(0, timeLeft / defaultTime);
            progressEl.style.transform = 'scaleX(' + ratio + ')';
        }

        function startTimer() {
            if (countdownInterval) return;
            isRunning = true;
            countdownInterval = setInterval(function(){ timeLeft -= 1; updateDisplay(); }, 1000);
            updateDisplay();
        }

        function pauseTimer() {
            clearInterval(countdownInterval);
            countdownInterval = null;
            isRunning = false;
            updateDisplay();
        }

        // FIX: reset กลับ defaultTime
        function resetTimer() {
            pauseTimer();
            timeLeft = defaultTime;
            updateDisplay();
        }

        function stopTimer() {
            pauseTimer();
            timeLeft = defaultTime;
            updateDisplay();
        }

        function applyCommand(cmd) {
            if (!cmd) return;
            if (cmd === 'start')      { startTimer(); }
            else if (cmd === 'pause') { pauseTimer(); }
            else if (cmd === 'reset') { resetTimer(); }
            else if (cmd === 'stop')  { stopTimer(); }
            else if (cmd.startsWith('set_')) {
                var seconds = parseInt(cmd.split('_')[1], 10);
                if (!isNaN(seconds) && seconds > 0) {
                    pauseTimer();
                    defaultTime = seconds;
                    timeLeft    = seconds;
                    updateDisplay();
                }
            } else if (cmd.startsWith('add_')) {
                var seconds = parseInt(cmd.split('_')[1], 10);
                if (!isNaN(seconds)) {
                    timeLeft    += seconds;
                    defaultTime  = Math.max(defaultTime, timeLeft);
                    updateDisplay();
                }
            } else if (cmd.startsWith('sub_')) {
                // FIX: clamp ป้องกัน overflow
                var seconds = parseInt(cmd.split('_')[1], 10);
                if (!isNaN(seconds)) {
                    timeLeft = Math.max(timeLeft - seconds, -MAX_NEGATIVE_SEC);
                    updateDisplay();
                }
            }
        }

        // FIX: ป้องกัน double-execution
        var isLocalAction = false;

        function localCommand(cmd) {
            applyCommand(cmd);
            if (database && firebase.auth().currentUser) {
                isLocalAction = true;
                database.ref('timer/command').set(cmd).finally(function(){
                    setTimeout(function(){ isLocalAction = false; }, 300);
                });
            }
        }

        // AUTH
        function showLogin() {
            var overlay = document.getElementById('loginOverlay');
            overlay.style.display    = 'flex';
            overlay.style.opacity    = '1';
            overlay.style.transition = '';
            setTimeout(function(){ document.getElementById('authEmail').focus(); }, 100);
        }

        function hideLogin() {
            var overlay = document.getElementById('loginOverlay');
            overlay.style.transition = 'opacity 0.5s ease';
            overlay.style.opacity    = '0';
            setTimeout(function(){ overlay.style.display = 'none'; }, 500);
        }

        function doLogin() {
            var email = document.getElementById('authEmail').value.trim();
            var pass  = document.getElementById('authPass').value;
            var btn   = document.getElementById('loginBtn');
            var err   = document.getElementById('authError');

            if (!email || !pass) {
                err.textContent   = 'กรุณากรอก email และ password';
                err.style.opacity = '1';
                return;
            }
            btn.textContent   = 'SIGNING IN...';
            btn.style.opacity = '0.5';
            btn.disabled      = true;

            firebase.auth().signInWithEmailAndPassword(email, pass)
                .catch(function(e) {
                    btn.textContent   = 'SIGN IN 🐱';
                    btn.style.opacity = '1';
                    btn.disabled      = false;
                    var msgs = {
                        'auth/user-not-found':     'ไม่พบ email นี้ในระบบ',
                        'auth/wrong-password':     'รหัสผ่านไม่ถูกต้อง',
                        'auth/invalid-email':      'รูปแบบ email ไม่ถูกต้อง',
                        'auth/too-many-requests':  'ลองใหม่อีกครั้ง (ถูก block ชั่วคราว)',
                        'auth/invalid-credential': 'Email หรือ Password ไม่ถูกต้อง',
                    };
                    err.textContent   = msgs[e.code] || 'เข้าสู่ระบบไม่ได้: ' + e.message;
                    err.style.opacity = '1';
                    document.getElementById('authPass').value = '';
                    document.getElementById('authPass').focus();
                });
        }

        function clearAuthError() {
            document.getElementById('authError').style.opacity = '0';
        }

        function doLogout() { firebase.auth().signOut(); }

        // FIREBASE INIT
        var database = null;

        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();

            firebase.auth().onAuthStateChanged(function(user) {
                if (user) {
                    hideLogin();
                    var emailEl = document.getElementById('userEmail');
                    if (emailEl) emailEl.textContent = user.email;
                } else {
                    showLogin();
                }
            });

            database.ref('.info/connected').on('value', function(snap) {
                if (snap.val()) {
                    fbDot.className    = 'dot connected';
                    fbLabel.textContent = 'LIVE';
                } else {
                    fbDot.className    = 'dot error';
                    fbLabel.textContent = 'OFFLINE';
                }
            });

            // FIX: guard auth + isLocalAction
            database.ref('timer/command').on('value', function(snap) {
                if (!firebase.auth().currentUser) return;
                if (isLocalAction) return;
                applyCommand(snap.val());
            });

        } catch(e) {
            fbDot.className    = 'dot error';
            fbLabel.textContent = 'NO DB';
            console.warn('Firebase not configured:', e.message);
        }

        // CURRENT CLOCK
        var clockEl   = document.getElementById('clockDisplay');
        var dateEl    = document.getElementById('clockDate');
        var DAYS_TH   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
        var MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

        function updateClock() {
            var now   = new Date();
            var hh    = now.getHours().toString().padStart(2,'0');
            var mm    = now.getMinutes().toString().padStart(2,'0');
            var ss    = now.getSeconds().toString().padStart(2,'0');
            clockEl.textContent = hh+':'+mm+':'+ss;
            var day   = DAYS_TH[now.getDay()];
            var date  = now.getDate();
            var month = MONTHS_TH[now.getMonth()];
            var year  = now.getFullYear() + 543;
            dateEl.textContent = day+' '+date+' '+month+' '+year;
        }
        updateClock();
        setInterval(updateClock, 1000);

        updateDisplay();
    </script>
</body>
</html>

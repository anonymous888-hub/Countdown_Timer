<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Countdown Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-white: #f0f0f0;
            --clr-yellow: #FFD700;
            --clr-orange: #FF8C00;
            --clr-red: #FF2020;
            --clr-red-dark: #CC0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* pad top for logo, pad bottom for clock */
            padding: 80px 20px 80px;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Ambient glow blob */
        .glow-bg {
            position: fixed;
            width: 700px;
            height: 350px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            background: var(--clr-white);
            transition: background 1s ease, opacity 1s ease;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(6px, 1.5vh, 20px);
            width: 100%;
        }

        /* Label */
        .label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            transition: color 1s;
        }

        /* Timer Display */
        #timer {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(100px, min(42vw, 55vh), 560px);
            line-height: 0.9;
            color: var(--clr-white);
            letter-spacing: 0.02em;
            transition: color 0.5s ease, text-shadow 0.5s ease;
            text-shadow: none;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* State: WARNING (yellow) */
        #timer.warning {
            color: var(--clr-yellow);
            text-shadow: none;
            animation: pulse-yellow 1s ease-in-out infinite;
        }

        /* State: CRITICAL (red) */
        #timer.critical {
            color: var(--clr-red);
            text-shadow: none;
            animation: pulse-red 0.6s ease-in-out infinite;
        }

        @keyframes pulse-yellow {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.75; }
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.6; }
        }

        @keyframes flash {
            0%   { opacity: 1; }
            50%  { opacity: 0.65; }
            100% { opacity: 1; }
        }

        /* Progress bar */
        .progress-track {
            width: min(600px, 80vw);
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 100%;
            background: var(--clr-white);
            transform-origin: left;
            transition: transform 1s linear, background 0.5s;
        }

        /* Status line */
        .status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.18);
            text-transform: uppercase;
            transition: color 0.5s;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 16px;
            margin-top: 10px;
        }

        button {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            padding: 10px 28px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
            border-color: rgba(255,255,255,0.5);
        }
        button:active { transform: scale(0.97); }

        .btn-start { border-color: rgba(100,255,100,0.3); color: rgba(100,255,100,0.6); }
        .btn-start:hover { background: rgba(100,255,100,0.08); color: rgba(100,255,100,1); border-color: rgba(100,255,100,0.8); }

        .btn-pause { border-color: rgba(255,215,0,0.3); color: rgba(255,215,0,0.6); }
        .btn-pause:hover { background: rgba(255,215,0,0.08); color: rgba(255,215,0,1); border-color: rgba(255,215,0,0.8); }

        .btn-reset { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.6); }
        .btn-reset:hover { background: rgba(255,80,80,0.08); color: rgba(255,80,80,1); border-color: rgba(255,80,80,0.8); }

        /* Company Logo */
        .company-logo {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 20;
        }
        .company-logo img {
            height: 48px;
            width: auto;
            opacity: 0.85;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
            transition: opacity 0.2s;
        }
        .company-logo img:hover { opacity: 1; }

        /* Firebase status dot */
        .firebase-status {
            position: fixed;
            top: 20px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.2);
            z-index: 20;
        }
        .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #666;
            transition: background 0.5s;
        }
        .dot.connected { background: #4CAF50; box-shadow: 0 0 8px #4CAF50; }
        .dot.error      { background: #FF4444; box-shadow: 0 0 8px #FF4444; }

        /* Set time input */
        .set-time {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }
        .set-time input {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            width: 80px;
            text-align: center;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6);
            padding: 7px 10px;
            border-radius: 2px;
            outline: none;
            letter-spacing: 0.1em;
        }
        .set-time input:focus { border-color: rgba(255,255,255,0.4); color: #fff; }
        .set-time span { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 0.2em; }

        /* Tablet & small screen responsive */
        @media (max-width: 1024px) {
            body { padding: 70px 16px 100px; }
            #timer { font-size: clamp(90px, min(40vw, 50vh), 440px); }
            .current-clock { bottom: 16px; left: 20px; }
            #clockDisplay { font-size: 36px; }
            .controls { gap: 8px; }
            button { padding: 8px 16px; font-size: 11px; }
            .company-logo img { height: 36px; }
        }
        @media (max-width: 768px) {
            body { padding: 60px 12px 90px; }
            #timer { font-size: clamp(80px, min(42vw, 46vh), 320px); }
            #clockDisplay { font-size: 28px; }
            .wrapper { gap: 8px; }
            button { padding: 7px 12px; font-size: 10px; }
        }
        @media (max-height: 700px) {
            body { padding: 60px 20px 90px; }
            #timer { font-size: clamp(80px, min(38vw, 48vh), 380px); }
            #clockDisplay { font-size: 28px; }
            .wrapper { gap: 6px; }
        }
        @media (max-height: 500px) {
            body { padding: 50px 20px 80px; }
            #timer { font-size: clamp(70px, min(34vw, 44vh), 280px); }
            #clockDisplay { font-size: 22px; }
            .label { display: none; }
        }
        .current-clock {
            position: fixed;
            bottom: 24px;
            left: 28px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            z-index: 20;
        }
        .clock-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
        #clockDisplay {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.06em;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
        }
        .clock-date {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.18);
        }
    </style>
</head>

    <div class="firebase-status">
        <div class="dot" id="fbDot"></div>
        <span id="fbLabel">FIREBASE</span>
    </div>

    <div class="wrapper">
        <div class="label" id="labelTop">COUNTDOWN</div>

        <div id="timer">05:00</div>

        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status" id="statusLine">— READY —</div>

        <div class="controls">
            <button class="btn-start" onclick="localCommand('start')">▶ START</button>
            <button class="btn-pause" onclick="localCommand('pause')">⏸ PAUSE</button>
            <button class="btn-reset" onclick="localCommand('reset')">↺ RESET</button>
        </div>

        <div class="set-time">
            <span>SET</span>
            <input type="number" id="minuteInput" value="5" min="1" max="99" placeholder="mm" />
            <span>MIN</span>
            <button onclick="applyNewTime()" style="padding:7px 16px; font-size:11px;">OK</button>
        </div>
    </div>

    <!-- Current Time Clock -->
    <div class="current-clock">
        <div class="clock-label">เวลาปัจจุบัน</div>
        <div id="clockDisplay">00:00:00</div>
        <div class="clock-date" id="clockDate"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ══════════════════════════════════════════
        //  FIREBASE CONFIG — ใส่ค่าของคุณที่นี่
        // ══════════════════════════════════════════
        const firebaseConfig = {
            databaseURL: "https://companion-timer-default-rtdb.asia-southeast1.firebasedatabase.app/"
            // เช่น: "https://my-timer-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // ══════════════════════════════════════════
        //  THRESHOLD CONFIG
        // ══════════════════════════════════════════
        const WARNING_THRESHOLD  = 120;   // วินาทีที่จะเปลี่ยนเป็นสีเหลือง
        const CRITICAL_THRESHOLD = 60;   // วินาทีที่จะเปลี่ยนเป็นสีแดง

        // ══════════════════════════════════════════
        //  TIMER STATE
        // ══════════════════════════════════════════
        let defaultTime       = 300;
        let timeLeft          = defaultTime;
        let countdownInterval = null;
        let isRunning         = false;

        const timerEl    = document.getElementById('timer');
        const progressEl = document.getElementById('progressFill');
        const statusEl   = document.getElementById('statusLine');
        const glowBg     = document.getElementById('glowBg');
        const fbDot      = document.getElementById('fbDot');
        const fbLabel    = document.getElementById('fbLabel');

        function updateDisplay() {
            const isNeg   = timeLeft < 0;
            const absTime = Math.abs(timeLeft);
            const hh      = Math.floor(absTime / 3600);
            const mm      = Math.floor((absTime % 3600) / 60).toString().padStart(2, '0');
            const ss      = (absTime % 60).toString().padStart(2, '0');
            const prefix  = isNeg ? '-' : '';
            timerEl.textContent = hh > 0
                ? prefix + hh + ':' + mm + ':' + ss
                : prefix + mm + ':' + ss;

            // Color state
            timerEl.classList.remove('warning', 'critical');
            if (timeLeft <= 0) {
                // Negative / expired → RED
                timerEl.classList.add('critical');
                glowBg.style.background  = 'rgb(255,32,32)';
                glowBg.style.opacity     = '0.18';
                progressEl.style.background = 'var(--clr-red)';
                statusEl.textContent     = isRunning ? '— TIME OVER —' : '— STOPPED —';
                statusEl.style.color     = 'rgba(255,80,80,0.5)';
            } else if (timeLeft <= CRITICAL_THRESHOLD) {
                // Near zero → RED
                timerEl.classList.add('critical');
                glowBg.style.background  = 'rgb(255,32,32)';
                glowBg.style.opacity     = '0.18';
                progressEl.style.background = 'var(--clr-red)';
                statusEl.textContent     = '— CRITICAL —';
                statusEl.style.color     = 'rgba(255,80,80,0.5)';
            } else if (timeLeft <= WARNING_THRESHOLD) {
                // Warning zone → YELLOW
                timerEl.classList.add('warning');
                glowBg.style.background  = 'rgb(255,215,0)';
                glowBg.style.opacity     = '0.15';
                progressEl.style.background = 'var(--clr-yellow)';
                statusEl.textContent     = '— WARNING —';
                statusEl.style.color     = 'rgba(255,215,0,0.5)';
            } else {
                // Normal → WHITE
                glowBg.style.background  = 'rgb(240,240,240)';
                glowBg.style.opacity     = '0.10';
                progressEl.style.background = 'var(--clr-white)';
                statusEl.textContent     = isRunning ? '— RUNNING —' : '— READY —';
                statusEl.style.color     = 'rgba(255,255,255,0.18)';
            }

            // Progress bar (only for positive countdown)
            const ratio = Math.max(0, timeLeft / defaultTime);
            progressEl.style.transform = `scaleX(${ratio})`;
        }

        function startTimer() {
            if (countdownInterval) return;
            isRunning = true;
            countdownInterval = setInterval(() => {
                timeLeft -= 1;
                updateDisplay();
            }, 1000);
            updateDisplay();
        }

        function pauseTimer() {
            clearInterval(countdownInterval);
            countdownInterval = null;
            isRunning = false;
            updateDisplay();
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = defaultTime;
            updateDisplay();
        }

        function localCommand(cmd) {
            if (cmd === 'start') startTimer();
            if (cmd === 'pause') pauseTimer();
            if (cmd === 'reset') resetTimer();

            // Sync to Firebase if connected
            try {
                database.ref('timer/command').set(cmd);
            } catch(e) {}
        }

        function applyNewTime() {
            const mins = parseInt(document.getElementById('minuteInput').value, 10);
            if (!isNaN(mins) && mins > 0) {
                defaultTime = mins * 60;
                resetTimer();
            }
        }

        // ══════════════════════════════════════════
        //  FIREBASE INIT
        // ══════════════════════════════════════════
        let database = null;
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();

            database.ref('.info/connected').on('value', snap => {
                if (snap.val()) {
                    fbDot.className   = 'dot connected';
                    fbLabel.textContent = 'LIVE';
                } else {
                    fbDot.className   = 'dot error';
                    fbLabel.textContent = 'OFFLINE';
                }
            });

            database.ref('timer/command').on('value', snap => {
                const cmd = snap.val();
                if (!cmd) return;

                if (cmd === 'start') {
                    startTimer();
                } else if (cmd === 'pause') {
                    pauseTimer();
                } else if (cmd === 'reset') {
                    resetTimer();
                } else if (cmd.startsWith('set_')) {
                    // ตั้งเวลาใหม่ เช่น set_3600 = 1 ชั่วโมง
                    const seconds = parseInt(cmd.split('_')[1]);
                    if (!isNaN(seconds) && seconds > 0) {
                        pauseTimer();
                        defaultTime = seconds;
                        timeLeft    = seconds;
                        updateDisplay();
                    }
                } else if (cmd.startsWith('add_')) {
                    // เพิ่มเวลา เช่น add_300 = +5 นาที
                    const seconds = parseInt(cmd.split('_')[1]);
                    if (!isNaN(seconds)) {
                        timeLeft    += seconds;
                        defaultTime  = Math.max(defaultTime, timeLeft);
                        updateDisplay();
                    }
                }
            });

        } catch(e) {
            fbDot.className   = 'dot error';
            fbLabel.textContent = 'NO DB';
            console.warn('Firebase not configured:', e.message);
        }

        // ══════════════════════════════════════════
        //  CURRENT CLOCK
        // ══════════════════════════════════════════
        const clockEl = document.getElementById('clockDisplay');
        const dateEl  = document.getElementById('clockDate');
        const DAYS_TH = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
        const MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

        function updateClock() {
            const now = new Date();
            const hh  = now.getHours().toString().padStart(2,'0');
            const mm  = now.getMinutes().toString().padStart(2,'0');
            const ss  = now.getSeconds().toString().padStart(2,'0');
            clockEl.textContent = `${hh}:${mm}:${ss}`;

            const day   = DAYS_TH[now.getDay()];
            const date  = now.getDate();
            const month = MONTHS_TH[now.getMonth()];
            const year  = now.getFullYear() + 543; // พ.ศ.
            dateEl.textContent = `${day} ${date} ${month} ${year}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Init display
        updateDisplay();
    </script>
</body>
</html>
